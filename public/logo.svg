<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- Antennas -->
  <line x1="75" y1="30" x2="75" y2="10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <circle cx="75" cy="8" r="6" fill="currentColor"/>
  <line x1="125" y1="30" x2="125" y2="10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <circle cx="125" cy="8" r="6" fill="currentColor"/>

  <!-- Head -->
  <rect x="55" y="30" width="90" height="70" rx="16" fill="currentColor"/>
  <rect x="60" y="35" width="80" height="60" rx="12" fill="white"/>
  <!-- Eye -->
  <circle cx="100" cy="60" r="18" fill="currentColor"/>
  <circle cx="100" cy="60" r="12" fill="white"/>
  <circle cx="100" cy="60" r="6" fill="currentColor"/>

  <!-- Ear -->
  <rect x="145" y="50" width="15" height="25" rx="6" fill="currentColor"/>
  <rect x="40" y="50" width="15" height="25" rx="6" fill="currentColor"/>

  <!-- Neck -->
  <rect x="85" y="100" width="30" height="12" rx="4" fill="currentColor"/>

  <!-- Body -->
  <rect x="45" y="112" width="110" height="90" rx="14" fill="currentColor"/>
  <rect x="52" y="119" width="96" height="76" rx="10" fill="white"/>

  <!-- Chest panel -->
  <rect x="62" y="125" width="76" height="20" rx="6" fill="currentColor" opacity="0.15"/>

  <!-- Buttons -->
  <circle cx="80" cy="165" r="7" fill="currentColor"/>
  <circle cx="100" cy="165" r="7" fill="currentColor"/>
  <circle cx="120" cy="165" r="7" fill="currentColor"/>
  <circle cx="80" cy="185" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="100" cy="185" r="5" fill="currentColor" opacity="0.5"/>

  <!-- Arms -->
  <rect x="20" y="120" width="20" height="55" rx="10" fill="currentColor"/>
  <circle cx="30" cy="180" r="8" fill="currentColor"/>
  <rect x="160" y="120" width="20" height="55" rx="10" fill="currentColor"/>
  <circle cx="170" cy="180" r="8" fill="currentColor"/>

  <!-- Legs -->
  <rect x="65" y="202" width="24" height="35" rx="8" fill="currentColor"/>
  <rect x="111" y="202" width="24" height="35" rx="8" fill="currentColor"/>

  <!-- Feet -->
  <rect x="58" y="232" width="38" height="14" rx="7" fill="currentColor"/>
  <rect x="104" y="232" width="38" height="14" rx="7" fill="currentColor"/>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="254" rx="60" ry="4" fill="currentColor" opacity="0.2"/>
</svg>
